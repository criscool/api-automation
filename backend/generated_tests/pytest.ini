[pytest]
testpaths = testcases
addopts = -v --tb=short --strict-markers

markers =
    smoke: 冒烟测试
    api: API接口测试
    login: 登录相关测试
    regression: 回归测试
    security: 安全测试

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
